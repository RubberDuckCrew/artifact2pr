name: Build and Test Action

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build Action
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Npm setup
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.15.0
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build action
        run: npm run build

      - name: Upload action artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: action-dist
          path: dist

  test:
    name: Test Action
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    permissions:
      pull-requests: write

    steps:
      - name: Create test file
        run: |
          mkdir -p test-artifact
          echo "Creating artifact for ${{ github.ref }} on ${{ github.sha }}" > test-artifact/test.txt

      - name: Upload test artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dummy-artifact
          path: test-artifact/test.txt

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: action.yml

      - name: Download action artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: action-dist
          path: dist

      - name: Test action in workflow
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-heading: "🧪 **Test Artifacts**"
          comment-if-no-artifacts: "⚠️ No artifacts found in test run."

  commit-build:
    name: Commit Action Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: build

    permissions:
      contents: write

    steps:
      - name: Check if secrets are available
        id: check-secrets
        run: |
          echo "secrets_available=${{
            vars.RUBBERDUCKCREW_BOT_APP_ID &&
            secrets.RUBBERDUCKCREW_BOT_APP_PRIVATE_KEY &&
            'true' || ''
          }}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub App token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        if: ${{ steps.check-secrets.outputs.secrets_available }}
        id: app-token
        with:
          client-id: ${{ vars.RUBBERDUCKCREW_BOT_APP_ID }}
          private-key: ${{ secrets.RUBBERDUCKCREW_BOT_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download action artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: action-dist
          path: dist

      - name: Check for repo changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain --untracked-files=all dist)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit dist directory
        if: steps.changes.outputs.changes == 'true'
        uses: suzuki-shunsuke/commit-action@f12e2d628a4ab72dcefe7890ae07e8dbf1e201b9 # v0.1.1
        with:
          commit_message: "📦 Update action build [skip ci]"
          files: dist/
          github_token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          fail_on_self_push: false
