name: Create Release
run-name: Create Release v${{ github.event.inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "The version to release (e.g., 1.2.3). The 'v' prefix is added automatically."
        required: true

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ github.event.inputs.version }}

    steps:
      - name: Validate version input
        run: |
          if ! echo "$VERSION" | grep -E -x '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$' >/dev/null; then
            echo "ERROR: VERSION is not a valid semver: '$VERSION'"
            exit 1
          fi

      - name: Check if secrets are available
        id: check-secrets
        run: |
          echo "secrets_available=${{
            vars.RUBBERDUCKCREW_BOT_APP_ID &&
            secrets.RUBBERDUCKCREW_BOT_APP_PRIVATE_KEY &&
            'true' || ''
          }}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        if: ${{ steps.check-secrets.outputs.secrets_available }}
        id: app-token
        with:
          client-id: ${{ vars.RUBBERDUCKCREW_BOT_APP_ID }}
          private-key: ${{ secrets.RUBBERDUCKCREW_BOT_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Npm setup
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          cache: "npm"

      - name: Update package.json version
        run: npm version "$VERSION" --no-git-tag-version

      - name: Install dependencies
        run: npm install

      - name: Lint code
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build action
        run: npm run build

      - name: Commit changes
        uses: suzuki-shunsuke/commit-action@06e3b49d4706498d325d29bd85adc82ecf2f5d8f # v1.0.0
        with:
          commit_message: "🔖 Release v${{ env.VERSION }} [skip ci]"
          files: |
            dist/
            package.json
            package-lock.json
          github_token: ${{ steps.app-token.outputs.token || github.token }}
          fail_on_self_push: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: "v${{ env.VERSION }}"
          name: "🔖 artifact2pr ${{ env.VERSION }}"
          draft: true
          prerelease: false
